<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Sensi</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    height: 100vh;
    background: radial-gradient(circle at top, #1a0000, #000);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #ff0000, transparent, #ff0000);
    animation: moveBg 8s linear infinite;
    opacity: 0.08;
}

@keyframes moveBg {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

.card {
    position: relative;
    width: 340px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(10, 10, 10, 0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    text-align: center;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    color: #ff2b2b;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: white;
    outline: none;
    margin-bottom: 15px;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px #ff0000;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #ff4d4d);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff0000;
}

.result {
    display: none;
}

.sensi-box {
    text-align: left;
    margin-top: 15px;
}

.sensi-box p {
    margin: 6px 0;
    display: flex;
    justify-content: space-between;
}

.valor {
    color: #ff2b2b;
}

hr {
    border: none;
    height: 1px;
    background: #ff0000;
    margin: 10px 0;
}

.voltar {
    margin-top: 15px;
    background: #111;
    border: 1px solid #ff0000;
}

/* Créditos */
.credito {
    position: fixed;
    width: 100%;
    text-align: center;
    color: rgba(255, 255, 255, 0.15);
    font-size: 12px;
    letter-spacing: 1px;
    pointer-events: none;
    user-select: none;
}

.topo {
    top: 8px;
}

.baixo {
    bottom: 8px;
}
</style>
</head>

<body>

<!-- Créditos -->
<div class="credito topo">@felliipzh</div>
<div class="credito baixo">@felliipzh</div>

<div class="card" id="home">
    <h1>GERADOR DE SENSI</h1>

    <input type="text" id="celular" placeholder="Digite seu celular">

    <button onclick="gerarSensi()">GERAR</button>
</div>

<div class="card result" id="resultado">
    <h1>SENSI PERFEITA 🔥</h1>

    <div class="sensi-box" id="sensiDados"></div>

    <button class="voltar" onclick="voltar()">VOLTAR</button>
</div>

<script>
function gerarNumero(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function gerarSensi() {
    let celular = document.getElementById("celular").value.toLowerCase().trim();

    if (celular === "") {
        alert("Digite o modelo do celular!");
        return;
    }

    const celularesValidos = [
        "samsung", "galaxy", "a10", "a20", "a30", "a50", "a51", "a71",
        "s21", "s22", "s23",
        "iphone", "iphone 11", "iphone 12", "iphone 13", "iphone 14", "iphone 15",
        "xiaomi", "redmi", "note 8", "note 9", "note 10", "note 11", "note 12",
        "poco", "poco x3", "poco x5",
        "motorola", "moto g", "moto g20", "moto g30", "moto g60", "moto g100"
    ];

    let encontrado = celularesValidos.some(nome => celular.includes(nome));

    if (!encontrado) {
        alert("Celular não encontrado");
        return;
    }

    let dados = {
        geral: gerarNumero(150, 200),
        redDot: gerarNumero(140, 190),
        mira2x: gerarNumero(130, 180),
        mira4x: gerarNumero(120, 170),
        awm: gerarNumero(70, 120),
        olhadinha: gerarNumero(140, 190),
        dpi: gerarNumero(400, 800),
        botao: gerarNumero(50, 100)
    };

    document.getElementById("sensiDados").innerHTML = `
        <p>Celular <span class="valor">${celular}</span></p>
        <p>Geral <span class="valor">${dados.geral}</span></p>
        <p>Red Dot <span class="valor">${dados.redDot}</span></p>
        <p>Mira 2x <span class="valor">${dados.mira2x}</span></p>
        <p>Mira 4x <span class="valor">${dados.mira4x}</span></p>
        <p>AWM <span class="valor">${dados.awm}</span></p>
        <p>Olhadinha <span class="valor">${dados.olhadinha}</span></p>
        <hr>
        <p>DPI <span class="valor">${dados.dpi}</span></p>
        <p>Botão <span class="valor">${dados.botao}%</span></p>
    `;

    document.getElementById("home").style.display = "none";
    document.getElementById("resultado").style.display = "block";
}

function voltar() {
    document.getElementById("home").style.display = "block";
    document.getElementById("resultado").style.display = "none";
}
</script>

</body>
</html>
